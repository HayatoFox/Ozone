name: CI

on:
  push:
  pull_request:

jobs:
  # Lint + tests sur Linux (Ubuntu).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  # Build + tests sur AlmaLinux 9 (cible serveur RHEL-family).
  almalinux:
    runs-on: ubuntu-latest
    container: almalinux:9
    steps:
      - name: Dépendances système
        run: dnf -y install gcc git && dnf clean all
      - uses: actions/checkout@v4
      - name: Toolchain Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build (release)
        run: cargo build --release -p ozone-api
      - name: Tests
        run: cargo test -p ozone-api
